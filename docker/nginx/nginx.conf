# Production reverse proxy: terminates TLS, routes to the NestJS API.
# The Python pdf-service is NOT exposed publicly (internal service-token only).

worker_processes auto;
events { worker_connections 1024; }

http {
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 15m;   # FIRC/e-FIRA uploads

    upstream api { server api:3000; }

    server {
        listen 80;
        server_name _;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;

        location /api/ {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            proxy_pass http://api/api/v1/health/live;
        }
    }
}
